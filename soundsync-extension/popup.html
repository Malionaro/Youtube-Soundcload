<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg: #0d0b18;
      --panel-bg: rgba(26, 21, 44, 0.65);
      --border: rgba(142, 124, 243, 0.15);
      --accent: #8e7cf3;
      --accent-glow: rgba(142, 124, 243, 0.4);
      --text: #f0edf9;
      --text-muted: #a69fb5;
      --success: #00b894;
      --danger: #ff7675;
    }

    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 13px;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-text {
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.5px;
      background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 500;
      background: rgba(255, 255, 255, 0.03);
      padding: 4px 8px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
    }

    .status-dot.online {
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
    }

    .status-dot.offline {
      background: var(--danger);
      box-shadow: 0 0 8px var(--danger);
    }

    .card {
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .url-display {
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 6px;
      padding: 8px;
      font-family: monospace;
      font-size: 11px;
      word-break: break-all;
      color: var(--text-muted);
      max-height: 50px;
      overflow-y: auto;
    }

    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 12px var(--accent-glow);
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px var(--accent-glow);
      filter: brightness(1.1);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn:disabled {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-muted);
      box-shadow: none;
      cursor: not-allowed;
      filter: none;
    }

    .info-footer {
      text-align: center;
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .toast {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%) translateY(40px);
      background: var(--success);
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 4px 12px rgba(0, 184, 148, 0.3);
      pointer-events: none;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo-row">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5" style="filter: drop-shadow(0 0 4px var(--accent-glow));">
          <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
        </svg>
        <span class="logo-text">SoundSync</span>
      </div>
      <div class="status-badge">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">Prüfe...</span>
      </div>
    </div>

    <div class="card">
      <div style="font-weight: 600; font-size: 12px; margin-bottom: 2px;">Aktueller Tab:</div>
      <div class="url-display" id="url-display">Kein aktiver Link gefunden.</div>
      <button class="btn" id="send-btn" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
        Link an Korb senden
      </button>
    </div>

    <div class="info-footer" id="info-footer">
      Öffne SoundSync auf dem PC, um Links zu synchronisieren.
    </div>
  </div>

  <div class="toast" id="toast">Erfolgreich hinzugefügt!</div>

  <script src="popup.js"></script>
</body>
</html>
